<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Grades</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"
        defer></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="scripts/edit.js" defer></script>
</head>
<body>
    <div id="navbar"></div>
    <fieldset class="container-lg">
        <legend class="border-bottom border-2 my-4 py-2 d-flex justify-content-between">
            <div>
                <i class="bi-table mx-2"></i>Edit Term <span id="term">#</span> Grades
            </div> 
            <div class="text-end">
                <small class="d-sm-inline d-none" style="font-size: 14px; color: red; margin-right: 1em;">Leaving the site will discard changes</small>
                <button id="discard" class="btn btn-danger"><i class="bi-trash"></i> Discard</button>
                <button id="save" class="btn btn-success" type="button"><i class="bi-download"></i> Save</button>
            </div>
        </legend>
        <table class="table table-bordered table-striped">
            <thead class="text-center align-middle">
                <tr>
                    <th class="bg-blue text-bg-primary col-2">Subject Code</th>
                    <th class="bg-blue text-bg-primary">Subject Name</th>
                    <th class="bg-blue text-bg-primary col-2">Final Grade</th>
                    <th class="bg-blue text-bg-primary col-1">Units</th>
                </tr>
            </thead>
            <tbody id="tablebody">
                <!-- Table Data -->
                
            </tbody>
        </table>
    </fieldset>
</body>
</html>
