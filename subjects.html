<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">

<body>
    <div id="navbar"></div>
    <fieldset class="container-lg">
        <legend class="border-bottom border-2 my-4 py-2">

            <thead class="text-center align-middle">

            <tbody id="tablebody">
                <!-- Table Data -->
    
            </tbody>
