<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Grades</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"
    defer></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="scripts/import.js"></script>
</head>
<body>
  <div id="navbar"></div>

  <div class="container-lg">
    <div class="d-flex justify-content-between align-items-center">
      <div class="mt-4">
        <h4>Importing Grades</h4>
        <p>Select your Final Grade for each corresponding subject.</p>
      </div>
      <div>
        <button class="btn btn-success"><i class="bi-download"></i> Save</button>
      </div>
    </div>
    <div id="main">

    </div>
    <div class="alert alert-warning my-4 container-xs mx-auto" role="alert">
      <div class="d-flex justify-content-between">
        <span><strong>Note:</strong> Make sure to input <b>Final Grades</b> instead of Midterm Grades.</span>
      </div>
    </div>
  </div>
</body>
</html>
